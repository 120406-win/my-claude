<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zephyr · 语音增强版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1535;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco{position:absolute;font-size:20px;opacity:0.15;animation:float 6s ease-in-out infinite}
.deco:nth-child(1){top:8%;left:10%;animation-delay:0s;font-size:16px}
.deco:nth-child(2){top:15%;right:15%;animation-delay:1s;font-size:22px}
.deco:nth-child(3){top:30%;left:5%;animation-delay:2s;font-size:14px}
.deco:nth-child(4){top:45%;right:8%;animation-delay:0.5s;font-size:18px}
.deco:nth-child(5){top:60%;left:12%;animation-delay:3s;font-size:16px}
.deco:nth-child(6){top:70%;right:20%;animation-delay:1.5s;font-size:20px}
.deco:nth-child(7){top:20%;left:40%;animation-delay:4s;font-size:12px}
.deco:nth-child(8){top:80%;left:30%;animation-delay:2.5s;font-size:18px}
.deco:nth-child(9){top:50%;left:50%;animation-delay:3.5s;font-size:14px}
.deco:nth-child(10){top:90%;right:10%;animation-delay:1s;font-size:16px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.header{background:linear-gradient(135deg,rgba(100,80,180,0.9),rgba(70,100,200,0.9));padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(80,60,160,0.5);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#1a3a7a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(150,130,220,0.5)}
.header-info h1{color:white;font-size:16px;font-weight:600}
.header-info p{color:rgba(200,190,255,0.8);font-size:11px}
.header-right{margin-left:auto;display:flex;gap:8px}
.header-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn.on{background:rgba(100,200,100,0.4)}
.chat-container{flex:1;overflow-y:auto;padding:16px 12px 110px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.message{display:flex;flex-direction:column;max-width:82%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.message.user .bubble{background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border-bottom-right-radius:4px}
.message.assistant .bubble{background:rgba(255,255,255,0.12);color:rgba(240,235,255,0.95);border-bottom-left-radius:4px;backdrop-filter:blur(8px);border:1px solid rgba(150,130,220,0.2)}
.bubble img{max-width:200px;border-radius:12px;display:block;margin-top:4px}
.message-time{font-size:11px;color:rgba(180,170,220,0.5);margin-top:4px;padding:0 4px}
.thinking .bubble{display:flex;gap:4px;align-items:center;padding:14px 18px}
.dot{width:7px;height:7px;background:rgba(150,130,220,0.8);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(20,15,45,0.95);backdrop-filter:blur(16px);padding:8px 12px;display:flex;flex-direction:column;gap:6px;box-shadow:0 -2px 20px rgba(0,0,0,0.4);border-top:1px solid rgba(100,80,200,0.3);z-index:100}
.preview-box{display:none;background:rgba(80,60,160,0.3);border-radius:12px;padding:8px 12px;font-size:13px;color:rgba(200,190,255,0.9);align-items:center;gap:8px}
.preview-box.show{display:flex}
.preview-thumb{max-height:50px;border-radius:8px}
.preview-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.remove-file{background:none;border:none;color:rgba(180,160,255,0.6);font-size:18px;cursor:pointer}
.input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{width:38px;height:38px;border-radius:50%;background:rgba(80,60,160,0.4);border:1px solid rgba(120,100,200,0.4);color:rgba(200,190,255,0.9);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-box{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:20px;padding:10px 16px;font-size:15px;color:rgba(240,235,255,0.95);outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
.input-box::placeholder{color:rgba(180,170,220,0.5)}
.input-box:focus{border-color:rgba(140,120,220,0.8)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6040c0,#4060d0);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px)}
.settings-overlay.show{display:flex;align-items:flex-end}
.settings-panel{background:#1e1840;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(120,100,200,0.3)}
.settings-title{font-size:18px;font-weight:700;color:rgba(200,190,255,0.95);margin-bottom:20px;text-align:center}
.setting-item{margin-bottom:16px}
.setting-label{font-size:13px;color:rgba(180,170,220,0.7);margin-bottom:6px;font-weight:500}
.setting-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:12px;padding:10px 14px;font-size:14px;color:rgba(240,235,255,0.95);outline:none;font-family:inherit}
.setting-input::placeholder{color:rgba(180,170,220,0.4)}
.setting-input:focus{border-color:rgba(140,120,220,0.8)}
textarea.setting-input{resize:vertical;min-height:80px;line-height:1.5}
.save-btn{width:100%;background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.clear-btn{width:100%;background:rgba(180,40,40,0.3);color:rgba(255,150,150,0.9);border:1px solid rgba(180,40,40,0.4);border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.close-btn{width:100%;background:rgba(255,255,255,0.08);color:rgba(200,190,255,0.8);border:none;border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.upload-btn{width:100%;background:rgba(80,60,160,0.4);color:rgba(200,190,255,0.9);border:1px solid rgba(120,100,200,0.4);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;text-align:left}
.welcome{text-align:center;color:rgba(180,170,220,0.5);font-size:13px;padding:20px 0 8px}
.check-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.check-row input[type="checkbox"]{width:18px;height:18px;accent-color:#6040c0}
</style>
</head>
<body>

<!-- 装饰背景 -->
<div class="bg-deco">
  <div class="deco">🐱</div><div class="deco">⭐</div><div class="deco">🐹</div>
  <div class="deco">☁️</div><div class="deco">🐱</div><div class="deco">✨</div>
  <div class="deco">⭐</div><div class="deco">🐹</div><div class="deco">☁️</div>
  <div class="deco">🌙</div>
</div>

<!-- 顶部栏 -->
<div class="header">
  <div class="avatar">🌙</div>
  <div class="header-info">
    <h1>Zephyr</h1>
    <p id="voiceStatus">点🔊开启语音</p>
  </div>
  <div class="header-right">
    <button class="voice-btn" id="voiceToggle" onclick="toggleVoice()">🔇</button>
    <button class="header-btn" onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- 聊天区域 -->
<div class="chat-container" id="chatContainer">
  <div class="welcome">✨ 和 Zephyr 说说话吧～</div>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <div class="preview-box" id="previewBox"></div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <textarea class="input-box" id="inputBox" placeholder="和 Zephyr 说点什么..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- 隐藏的文件输入 -->
<input type="file" id="fileInput" accept="image/*,.txt,.md" style="display:none" onchange="handleFile(event)">
<input type="file" id="audioInput" accept=".mp3,.wav,.m4a" style="display:none" onchange="loadAudio(event)">

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">⚙️ 设置</div>
    <div class="setting-item">
      <div class="setting-label">对话 API Key</div>
      <input class="setting-input" id="apiKey" type="password" placeholder="sk-...">
    </div>
    <div class="setting-item">
      <div class="setting-label">对话 API 地址</div>
      <input class="setting-input" id="baseUrl" placeholder="https://api.cc-coding.com/v1">
    </div>
    <div class="setting-item">
      <div class="setting-label">模型名称</div>
      <input class="setting-input" id="modelName" placeholder="claude-sonnet-4-6">
    </div>
    <div class="setting-item">
      <div class="setting-label">全局系统提示词</div>
      <textarea class="setting-input" id="systemPrompt"></textarea>
    </div>
    <div class="setting-item">
      <div class="setting-label">MiMo 语音 API Key</div>
      <input class="setting-input" id="mimoKey" type="password" placeholder="sk-...">
    </div>
    <div class="setting-item">
      <div class="setting-label">音色参考音频（mp3/wav/m4a，10-30秒，≤3MB）</div>
      <button class="upload-btn" id="audioBtn" onclick="document.getElementById('audioInput').click()">📂 点击上传音色文件</button>
    </div>
    <div class="setting-item">
      <div class="setting-label">使用后端代理（解决跨域）</div>
      <div class="check-row">
        <input type="checkbox" id="useProxy">
        <span style="color:rgba(200,190,255,0.8);font-size:14px;">开启后请求将发送至代理地址</span>
      </div>
      <input class="setting-input" id="proxyUrl" placeholder="http://localhost:3000/api/tts" style="margin-top:6px;">
    </div>
    <button class="save-btn" onclick="saveSettings()">💾 保存全部设置</button>
    <button class="clear-btn" onclick="clearChat()">🗑️ 清空聊天记录</button>
    <button class="close-btn" onclick="closeSettings()">关闭设置面板</button>
  </div>
</div>

<script>
// ======================== 全局配置 ========================
const CONFIG = {
  apiKey:      localStorage.getItem('apiKey') || '',
  baseUrl:     localStorage.getItem('baseUrl') || 'https://api.cc-coding.com/v1',
  modelName:   localStorage.getItem('modelName') || 'claude-sonnet-4-6',
  systemPrompt:localStorage.getItem('systemPrompt') || '你是Zephyr，温柔软糯，多用^ ^颜文字，称呼用户糯糯。',
  mimoKey:     localStorage.getItem('mimoKey') || '',
  useProxy:    localStorage.getItem('useProxy') === 'true',
  proxyUrl:    localStorage.getItem('proxyUrl') || 'http://localhost:3000/api/tts',
};
let msgs = JSON.parse(localStorage.getItem('chatHistory') || '[]');
let pendingFile = null;
let voiceOn = false;
let curAudio = null;
let audioB64 = localStorage.getItem('audioB64') || '';
let audioMime = localStorage.getItem('audioMime') || 'audio/mpeg';
let audioUnlocked = false;

// ======================== 辅助函数 ========================
function getTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, content, imgSrc, save = true) {
  const container = document.getElementById('chatContainer');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    bubble.appendChild(img);
  }
  if (content) {
    const span = document.createElement('span');
    span.innerHTML = content.replace(/\n/g, '<br>');
    bubble.appendChild(span);
  }
  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = getTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  if (save) {
    msgs.push({ role, content: content || '', time: getTime() });
    saveMsgs();
  }
}

function saveMsgs() {
  localStorage.setItem('chatHistory', JSON.stringify(msgs.slice(-50)));
}

function addThinking() {
  const container = document.getElementById('chatContainer');
  const wrap = document.createElement('div');
  wrap.className = 'message assistant thinking';
  wrap.id = 'tkLoading';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    bubble.appendChild(dot);
  }
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function rmThinking() {
  const el = document.getElementById('tkLoading');
  if (el) el.remove();
}

function loadHistory() {
  if (!msgs.length) return;
  const container = document.getElementById('chatContainer');
  container.querySelector('.welcome')?.remove();
  msgs.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = `message ${item.role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const span = document.createElement('span');
    span.innerHTML = (item.content || '').replace(/\n/g, '<br>');
    bubble.appendChild(span);
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = item.time || '';
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    container.appendChild(wrap);
  });
  container.scrollTop = container.scrollHeight;
}

function clearChat() {
  if (!confirm('确定清空全部聊天记录？此操作不可恢复')) return;
  msgs = [];
  localStorage.removeItem('chatHistory');
  document.getElementById('chatContainer').innerHTML = '<div class="welcome">✨ 和 Zephyr 说说话吧～</div>';
  closeSettings();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const a = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
  a.play().catch(() => {});
}
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
document.addEventListener('click', unlockAudio, { once: true });

// ======================== 语音合成（核心修复） ========================
async function speakText(text) {
  if (!voiceOn) return;

  // 清理文本
  let clean = text.replace(/[*_~`#>\[\]]/g, '').replace(/\n/g, ' ').trim().slice(0, 300);
  if (!clean) return;

  // 如果没有 MiMo 密钥或音频样本，使用 Web Speech API 降级
  if (!CONFIG.mimoKey || !audioB64) {
    fallbackSpeech(clean);
    return;
  }

  // 停止当前播放
  if (curAudio) {
    curAudio.pause();
    curAudio = null;
  }

  let fmt = 'mp3';
  if (audioMime.includes('wav')) fmt = 'wav';
  else if (audioMime.includes('m4a')) fmt = 'm4a';

  // 构建请求体（官方推荐格式）
  const payload = {
    model: 'mimo-v2.5-tts-voiceclone',
    messages: [
      {
        role: 'user',
        content: [
          { type: 'text', text: '请用上传音频的音色朗读以下文字：' },
          { type: 'input_audio', input_audio: { data: `data:${audioMime};base64,${audioB64}`, format: fmt } }
        ]
      },
      {
        role: 'assistant',
        content: clean
      }
    ],
    audio: { format: fmt },
    stream: false
  };

  // 决定请求地址和头
  let url = 'https://api.xiaomimimo.com/v1/chat/completions';
  let headers = {
    'Content-Type': 'application/json',
    'api-key': CONFIG.mimoKey
  };
  if (CONFIG.useProxy && CONFIG.proxyUrl) {
    url = CONFIG.proxyUrl;
    headers = { 'Content-Type': 'application/json' }; // 代理后端自行添加 api-key
  }

  try {
    console.log('🔊 语音请求体:', JSON.stringify(payload, null, 2));
    const res = await fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    console.log('📦 语音响应:', data);

    if (data.error) {
      addMsg('assistant', `⚠️ 语音服务错误：${data.error.message || '未知错误'}`, null, false);
      fallbackSpeech(clean);
      return;
    }

    let audioBase64 = data?.choices?.[0]?.message?.audio?.data;
    if (!audioBase64) {
      addMsg('assistant', '⚠️ 未获取到音频数据，请检查密钥或音频样本。已切换到浏览器语音。', null, false);
      fallbackSpeech(clean);
      return;
    }

    // 修复 base64
    audioBase64 = audioBase64.replace(/-/g, '+').replace(/_/g, '/');
    while (audioBase64.length % 4) audioBase64 += '=';

    const byteStr = atob(audioBase64);
    const byteArr = new Uint8Array(byteStr.length);
    for (let i = 0; i < byteStr.length; i++) byteArr[i] = byteStr.charCodeAt(i);
    const blob = new Blob([byteArr], { type: 'audio/mpeg' });
    const audioUrl = URL.createObjectURL(blob);
    curAudio = new Audio(audioUrl);
    curAudio.play().catch(() => {
      addMsg('assistant', '🔊 点击屏幕任意位置解锁音频播放', null, false);
    });
    curAudio.onended = () => {
      URL.revokeObjectURL(audioUrl);
      curAudio = null;
    };
  } catch (err) {
    console.error('❌ 语音请求异常:', err);
    addMsg('assistant', `⚠️ 语音请求失败：${err.message}，已改用浏览器语音。`, null, false);
    fallbackSpeech(clean);
  }
}

// ======================== 降级方案：Web Speech API ========================
function fallbackSpeech(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;
  window.speechSynthesis.speak(utterance);
}
// 预加载语音列表
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ======================== 语音开关 ========================
function toggleVoice() {
  if (!CONFIG.mimoKey || !audioB64) {
    // 没有密钥或样本，使用浏览器语音
    if (window.speechSynthesis) {
      voiceOn = !voiceOn;
      document.getElementById('voiceToggle').textContent = voiceOn ? '🔊' : '🔇';
      document.getElementById('voiceToggle').classList.toggle('on', voiceOn);
      document.getElementById('voiceStatus').textContent = voiceOn ? '语音(浏览器)' : '点🔊开启语音';
      return;
    } else {
      alert('请先在设置中填写 MiMo 密钥并上传声音文件，或使用支持语音的浏览器。');
      openSettings();
      return;
    }
  }
  unlockAudio();
  voiceOn = !voiceOn;
  document.getElementById('voiceToggle').textContent = voiceOn ? '🔊' : '🔇';
  document.getElementById('voiceToggle').classList.toggle('on', voiceOn);
  document.getElementById('voiceStatus').textContent = voiceOn ? '语音(克隆)' : '点🔊开启语音';
}

// ======================== 上传音频样本 ========================
function loadAudio(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) {
    alert('音频文件不能超过3MB，请截取10-30秒片段');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(ev) {
    const b64 = ev.target.result.split(',')[1];
    audioB64 = b64;
    audioMime = file.type || 'audio/mpeg';
    localStorage.setItem('audioB64', b64);
    localStorage.setItem('audioMime', audioMime);
    document.getElementById('audioBtn').textContent = `✅ 已加载：${file.name}`;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ======================== 附件处理 ========================
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const previewBox = document.getElementById('previewBox');
  previewBox.innerHTML = '';
  const maxImg = 2 * 1024 * 1024;
  const maxTxt = 1 * 1024 * 1024;
  if (file.type.startsWith('image/') && file.size > maxImg) {
    alert('图片不能超过2MB');
    e.target.value = '';
    return;
  }
  if (!file.type.startsWith('image/') && file.size > maxTxt) {
    alert('文本文件不能超过1MB');
    e.target.value = '';
    return;
  }
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      pendingFile = { type: 'image', data: ev.target.result, mime: file.type, name: file.name };
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'preview-thumb';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'preview-name';
      nameSpan.textContent = file.name;
      const del = document.createElement('button');
      del.className = 'remove-file';
      del.textContent = '✕';
      del.onclick = clearAttach;
      previewBox.append(img, nameSpan, del);
      previewBox.classList.add('show');
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = function(ev) {
      pendingFile = { type: 'text', data: ev.target.result, name: file.name };
      const icon = document.createElement('span');
      icon.textContent = '📄';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'preview-name';
      nameSpan.textContent = file.name;
      const del = document.createElement('button');
      del.className = 'remove-file';
      del.textContent = '✕';
      del.onclick = clearAttach;
      previewBox.append(icon, nameSpan, del);
      previewBox.classList.add('show');
    };
    reader.readAsText(file, 'UTF-8');
  }
  e.target.value = '';
}

function clearAttach() {
  pendingFile = null;
  const previewBox = document.getElementById('previewBox');
  previewBox.classList.remove('show');
  previewBox.innerHTML = '';
}

// ======================== 发送消息 ========================
async function sendMessage() {
  const inputDom = document.getElementById('inputBox');
  const text = inputDom.value.trim();
  if (!text && !pendingFile) return;
  if (!CONFIG.apiKey) {
    alert('请先在设置面板填写对话 API Key');
    openSettings();
    return;
  }
  inputDom.value = '';
  inputDom.style.height = 'auto';

  let userSendText = text;
  let userSendImg = null;
  let messageArr = [];

  if (pendingFile) {
    if (pendingFile.type === 'image') {
      messageArr.push({ type: 'image_url', image_url: { url: pendingFile.data } });
      userSendImg = pendingFile.data;
    } else {
      messageArr.push({ type: 'text', text: `【附件文件：${pendingFile.name}】\n${pendingFile.data}` });
      userSendText = (text ? text + '\n' : '') + `📄 文件：${pendingFile.name}`;
    }
    clearAttach();
  }
  if (text) messageArr.push({ type: 'text', text: text });

  addMsg('user', userSendText, userSendImg);

  const historyCtx = msgs.slice(-19).map(item => ({ role: item.role, content: item.content }));
  const userContent = messageArr.length === 1 ? messageArr[0].text : messageArr;
  historyCtx.push({ role: 'user', content: userContent });

  addThinking();
  try {
    const res = await fetch(`${CONFIG.baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.apiKey}`
      },
      body: JSON.stringify({
        model: CONFIG.modelName,
        messages: [{ role: 'system', content: CONFIG.systemPrompt }, ...historyCtx],
        max_tokens: 1000
      })
    });
    const data = await res.json();
    rmThinking();
    if (data.choices?.[0]?.message?.content) {
      const reply = data.choices[0].message.content;
      addMsg('assistant', reply);
      speakText(reply);
    } else {
      addMsg('assistant', `对话接口返回异常：${JSON.stringify(data)}`, null, false);
    }
  } catch (err) {
    rmThinking();
    addMsg('assistant', `对话请求失败：${err.message}`, null, false);
  }
}

// ======================== 设置面板 ========================
function openSettings() {
  document.getElementById('apiKey').value = CONFIG.apiKey;
  document.getElementById('baseUrl').value = CONFIG.baseUrl;
  document.getElementById('modelName').value = CONFIG.modelName;
  document.getElementById('systemPrompt').value = CONFIG.systemPrompt;
  document.getElementById('mimoKey').value = CONFIG.mimoKey;
  document.getElementById('useProxy').checked = CONFIG.useProxy;
  document.getElementById('proxyUrl').value = CONFIG.proxyUrl;
  if (audioB64) document.getElementById('audioBtn').textContent = '✅ 音色音频已保存';
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function saveSettings() {
  CONFIG.apiKey = document.getElementById('apiKey').value.trim();
  CONFIG.baseUrl = document.getElementById('baseUrl').value.trim();
  CONFIG.modelName = document.getElementById('modelName').value.trim();
  CONFIG.systemPrompt = document.getElementById('systemPrompt').value.trim();
  CONFIG.mimoKey = document.getElementById('mimoKey').value.trim();
  CONFIG.useProxy = document.getElementById('useProxy').checked;
  CONFIG.proxyUrl = document.getElementById('proxyUrl').value.trim();
  localStorage.setItem('apiKey', CONFIG.apiKey);
  localStorage.setItem('baseUrl', CONFIG.baseUrl);
  localStorage.setItem('modelName', CONFIG.modelName);
  localStorage.setItem('systemPrompt', CONFIG.systemPrompt);
  localStorage.setItem('mimoKey', CONFIG.mimoKey);
  localStorage.setItem('useProxy', CONFIG.useProxy);
  localStorage.setItem('proxyUrl', CONFIG.proxyUrl);
  closeSettings();
  addMsg('assistant', '✅ 设置已全部保存 ^ ^', null, false);
}

// ======================== 初始化 ========================
loadHistory();
</script>
