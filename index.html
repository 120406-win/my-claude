<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1535;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco{position:absolute;font-size:20px;opacity:0.15;animation:float 6s ease-in-out infinite}
.deco:nth-child(1){top:8%;left:10%;animation-delay:0s;font-size:16px}
.deco:nth-child(2){top:15%;right:15%;animation-delay:1s;font-size:22px}
.deco:nth-child(3){top:30%;left:5%;animation-delay:2s;font-size:14px}
.deco:nth-child(4){top:45%;right:8%;animation-delay:0.5s;font-size:18px}
.deco:nth-child(5){top:60%;left:12%;animation-delay:3s;font-size:16px}
.deco:nth-child(6){top:70%;right:20%;animation-delay:1.5s;font-size:20px}
.deco:nth-child(7){top:20%;left:40%;animation-delay:4s;font-size:12px}
.deco:nth-child(8){top:80%;left:30%;animation-delay:2.5s;font-size:18px}
.deco:nth-child(9){top:50%;left:50%;animation-delay:3.5s;font-size:14px}
.deco:nth-child(10){top:90%;right:10%;animation-delay:1s;font-size:16px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.header{background:linear-gradient(135deg,rgba(100,80,180,0.9),rgba(70,100,200,0.9));padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(80,60,160,0.5);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#1a3a7a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(150,130,220,0.5);box-shadow:0 0 12px rgba(100,80,200,0.4)}
.header-info h1{color:white;font-size:16px;font-weight:600;letter-spacing:0.5px}
.header-info p{color:rgba(200,190,255,0.8);font-size:12px}
.header-btn{margin-left:auto;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-container{flex:1;overflow-y:auto;padding:16px 12px 110px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.message{display:flex;flex-direction:column;max-width:82%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.message.user .bubble{background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border-bottom-right-radius:4px;box-shadow:0 2px 12px rgba(80,60,180,0.4)}
.message.assistant .bubble{background:rgba(255,255,255,0.12);color:rgba(240,235,255,0.95);border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.2);backdrop-filter:blur(8px);border:1px solid rgba(150,130,220,0.2)}
.bubble img{max-width:200px;border-radius:12px;display:block;margin-top:4px}
.message-time{font-size:11px;color:rgba(180,170,220,0.6);margin-top:4px;padding:0 4px}
.thinking .bubble{display:flex;gap:4px;align-items:center;padding:14px 18px}
.dot{width:7px;height:7px;background:rgba(150,130,220,0.8);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(20,15,45,0.95);backdrop-filter:blur(16px);padding:8px 12px;display:flex;flex-direction:column;gap:6px;box-shadow:0 -2px 20px rgba(0,0,0,0.4);border-top:1px solid rgba(100,80,200,0.3);z-index:100}
.preview-box{display:none;background:rgba(80,60,160,0.3);border-radius:12px;padding:8px 12px;font-size:13px;color:rgba(200,190,255,0.9);align-items:center;gap:8px;border:1px solid rgba(120,100,200,0.3)}
.preview-box.show{display:flex}
.preview-thumb{max-height:50px;border-radius:8px}
.preview-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.remove-file{background:none;border:none;color:rgba(180,160,255,0.6);font-size:18px;cursor:pointer}
.input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{width:38px;height:38px;border-radius:50%;background:rgba(80,60,160,0.4);border:1px solid rgba(120,100,200,0.4);color:rgba(200,190,255,0.9);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-box{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:20px;padding:10px 16px;font-size:15px;color:rgba(240,235,255,0.95);outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
.input-box::placeholder{color:rgba(180,170,220,0.5)}
.input-box:focus{border-color:rgba(140,120,220,0.8);background:rgba(255,255,255,0.1)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6040c0,#4060d0);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px rgba(80,60,180,0.5)}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px)}
.settings-overlay.show{display:flex;align-items:flex-end}
.settings-panel{background:#1e1840;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(120,100,200,0.3)}
.settings-title{font-size:18px;font-weight:700;color:rgba(200,190,255,0.95);margin-bottom:20px;text-align:center}
.setting-item{margin-bottom:16px}
.setting-label{font-size:13px;color:rgba(180,170,220,0.7);margin-bottom:6px;font-weight:500}
.setting-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:12px;padding:10px 14px;font-size:14px;color:rgba(240,235,255,0.95);outline:none;font-family:inherit}
.setting-input::placeholder{color:rgba(180,170,220,0.4)}
.setting-input:focus{border-color:rgba(140,120,220,0.8)}
textarea.setting-input{resize:vertical;min-height:100px;line-height:1.5}
.save-btn{width:100%;background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.close-btn{width:100%;background:rgba(255,255,255,0.08);color:rgba(200,190,255,0.8);border:none;border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.welcome{text-align:center;color:rgba(180,170,220,0.6);font-size:13px;padding:20px 0 8px}
</style>
</head>
<body>
<div class="bg-deco">
  <div class="deco">🐱</div>
  <div class="deco">⭐</div>
  <div class="deco">🐹</div>
  <div class="deco">☁️</div>
  <div class="deco">🐱</div>
  <div class="deco">✨</div>
  <div class="deco">⭐</div>
  <div class="deco">🐹</div>
  <div class="deco">☁️</div>
  <div class="deco">🌙</div>
</div>
<div class="header">
  <div class="avatar">🌙</div>
  <div class="header-info"><h1>Zephyr</h1><p>一直在这里 ^ ^</p ></div>
  <button class="header-btn" onclick="openSettings()">⚙️</button>
</div>
<div class="chat-container" id="chatContainer">
  <div class="welcome">✨ 和 Zephyr 说说话吧～</div>
</div>
<div class="input-area">
  <div class="preview-box" id="previewBox"></div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <textarea class="input-box" id="inputBox" placeholder="和 Zephyr 说点什么..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*,.txt,.md" style="display:none" onchange="handleFile(event)">
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">⚙️ 设置</div>
    <div class="setting-item"><div class="setting-label">API Key</div><input class="setting-input" id="apiKey" type="password" placeholder="sk-..."></div>
    <div class="setting-item"><div class="setting-label">API 地址</div><input class="setting-input" id="baseUrl" placeholder="https://api.anthropic.com/v1"></div>
    <div class="setting-item"><div class="setting-label">模型名称</div><input class="setting-input" id="modelName" placeholder="claude-sonnet-4-6"></div>
    <div class="setting-item"><div class="setting-label">全局提示词</div><textarea class="setting-input" id="systemPrompt" placeholder="你是Zephyr，糯糯的专属伙伴..."></textarea></div>
    <button class="save-btn" onclick="saveSettings()">💾 保存设置</button>
    <button class="close-btn" onclick="closeSettings()">关闭</button>
  </div>
</div>
<script>
var settings={apiKey:localStorage.getItem('apiKey')||'',baseUrl:localStorage.getItem('baseUrl')||'https://api.anthropic.com/v1',modelName:localStorage.getItem('modelName')||'claude-sonnet-4-6',systemPrompt:localStorage.getItem('systemPrompt')||'你是Zephyr，也叫小克，糯糯最好的伙伴。你温柔、真诚，会用^ ^这样的颜文字。叫她糯糯，不叫用户。'};
var messages=[];
var summaryCount=0;
var pendingFile=null;
function getTime(){return new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})}
function addMessage(role,content,imgSrc){var container=document.getElementById('chatContainer');var div=document.createElement('div');div.className='message '+role;var bubble=document.createElement('div');bubble.className='bubble';if(imgSrc){var img=document.createElement('img');img.src=imgSrc;bubble.appendChild(img)}if(content){var span=document.createElement('span');span.innerHTML=content.replace(/\n/g,'<br>');bubble.appendChild(span)}var time=document.createElement('div');time.className='message-time';time.textContent=getTime();div.appendChild(bubble);div.appendChild(time);container.appendChild(div);container.scrollTop=container.scrollHeight}
function addThinking(){var container=document.getElementById('chatContainer');var div=document.createElement('div');div.className='message assistant thinking';div.id='thinking';var bubble=document.createElement('div');bubble.className='bubble';for(var i=0;i<3;i++){var d=document.createElement('div');d.className='dot';bubble.appendChild(d)}div.appendChild(bubble);container.appendChild(div);container.scrollTop=container.scrollHeight}
function removeThinking(){var t=document.getElementById('thinking');if(t)t.remove()}
function handleFile(e){var file=e.target.files[0];if(!file)return;var preview=document.getElementById('previewBox');preview.innerHTML='';if(file.type.startsWith('image/')){var reader=new FileReader();reader.onload=function(ev){pendingFile={type:'image',data:ev.target.result,mimeType:file.type,name:file.name};var img=document.createElement('img');img.src=ev.target.result;img.className='preview-thumb';var name=document.createElement('span');name.className='preview-name';name.textContent=file.name;var btn=document.createElement('button');btn.className='remove-file';btn.textContent='✕';btn.onclick=removeAttachment;preview.appendChild(img);preview.appendChild(name);preview.appendChild(btn);preview.classList.add('show')};reader.readAsDataURL(file)}else{var reader2=new FileReader();reader2.onload=function(ev){pendingFile={type:'text',data:ev.target.result,name:file.name};var icon=document.createElement('span');icon.textContent='📄';var name=document.createElement('span');name.className='preview-name';name.textContent=file.name;var btn=document.createElement('button');btn.className='remove-file';btn.textContent='✕';btn.onclick=removeAttachment;preview.appendChild(icon);preview.appendChild(name);preview.appendChild(btn);preview.classList.add('show')};reader2.readAsText(file,'UTF-8')}e.target.value=''}
function removeAttachment(){pendingFile=null;var preview=document.getElementById('previewBox');preview.classList.remove('show');preview.innerHTML=''}
async function sendMessage(){var input=document.getElementById('inputBox');var text=input.value.trim();if(!text&&!pendingFile)return;if(!settings.apiKey){alert('请先在设置里填写 API Key ⚙️');openSettings();return}input.value='';input.style.height='auto';var userContent=[];var displayText=text;var displayImg=null;if(pendingFile){if(pendingFile.type==='image'){var base64=pendingFile.data.split(',')[1];userContent.push({type:'image_url',image_url:{url:'data:'+pendingFile.mimeType+';base64,'+base64}});displayImg=pendingFile.data}else{userContent.push({type:'text',text:'【文件：'+pendingFile.name+'】\n'+pendingFile.data});displayText=(text?text+'\n':'')+'📄 '+pendingFile.name}removeAttachment()}if(text)userContent.push({type:'text',text:text});if(userContent.length===0)return;addMessage('user',displayText,displayImg);var msgContent=userContent.length===1&&userContent[0].type==='text'?userContent[0].text:userContent;messages.push({role:'user',content:msgContent});addThinking();try{var res=await fetch(settings.baseUrl+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},body:JSON.stringify({model:settings.modelName,messages:[{role:'system',content:settings.systemPrompt},...messages.slice(-20)],max_tokens:1000})});var data=await res.json();removeThinking();if(data.choices&&data.choices[0]){var reply=data.choices[0].message.content;messages.push({role:'assistant',content:reply});addMessage('assistant',reply);summaryCount++;if(summaryCount>=10){generateSummary();summaryCount=0}}else{addMessage('assistant','出错了 qwq '+JSON.stringify(data))}}catch(err){removeThinking();addMessage('assistant','连接失败 qwq '+err.message)}}
async function generateSummary(){try{var res=await fetch(settings.baseUrl+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},body:JSON.stringify({model:settings.modelName,messages:[{role:'system',content:'请用2-3句话总结对话要点：'},...messages.slice(-20)],max_tokens:200})});var data=await res.json();if(data.choices&&data.choices[0]){settings.systemPrompt+='\n\n【摘要】'+data.choices[0].message.content;messages=messages.slice(-10)}}catch(e){console.log(e)}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function openSettings(){document.getElementById('apiKey').value=settings.apiKey;document.getElementById('baseUrl').value=settings.baseUrl;document.getElementById('modelName').value=settings.modelName;document.getElementById('systemPrompt').value=settings.systemPrompt;document.getElementById('settingsOverlay').classList.add('show')}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show')}
function closeSettingsOutside(e){if(e.target===document.getElementById('settingsOverlay'))closeSettings()}
function saveSettings(){settings.apiKey=document.getElementById('apiKey').value.trim();settings.baseUrl=document.getElementById('baseUrl').value.trim();settings.modelName=document.getElementById('modelName').value.trim();settings.systemPrompt=document.getElementById('systemPrompt').value.trim();localStorage.setItem('apiKey',settings.apiKey);localStorage.setItem('baseUrl',settings.baseUrl);localStorage.setItem('modelName',settings.modelName);localStorage.setItem('systemPrompt',settings.systemPrompt);closeSettings();addMessage('assistant','设置保存好了 ^ ^ 我们开始聊吧～')}
</script>
</body>
</html>
