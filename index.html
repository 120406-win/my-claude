<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的小克</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#e8e4f9 0%,#f0ebff 50%,#e4e8ff 100%);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.header{background:linear-gradient(135deg,#9b8ec4,#7b9fd4);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(123,104,196,0.3);position:sticky;top:0;z-index:100}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#c4b5f5,#a5b4fc);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-info h1{color:white;font-size:16px;font-weight:600}
.header-info p{color:rgba(255,255,255,0.8);font-size:12px}
.header-btn{margin-left:auto;background:rgba(255,255,255,0.2);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-container{flex:1;overflow-y:auto;padding:16px 12px 90px;display:flex;flex-direction:column;gap:12px}
.message{display:flex;flex-direction:column;max-width:80%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.message.user .bubble{background:linear-gradient(135deg,#9b8ec4,#7b9fd4);color:white;border-bottom-right-radius:4px}
.message.assistant .bubble{background:white;color:#333;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(123,104,196,0.12)}
.message-time{font-size:11px;color:#aaa;margin-top:4px;padding:0 4px}
.thinking .bubble{display:flex;gap:4px;align-items:center;padding:14px 18px}
.dot{width:8px;height:8px;background:#9b8ec4;border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);padding:10px 12px;display:flex;gap:10px;align-items:flex-end;box-shadow:0 -2px 16px rgba(123,104,196,0.1);border-top:1px solid rgba(155,142,196,0.15)}
.input-box{flex:1;background:#f4f1ff;border:1.5px solid #d4c9f5;border-radius:20px;padding:10px 16px;font-size:15px;color:#333;outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
.input-box:focus{border-color:#9b8ec4;background:#f8f5ff}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#9b8ec4,#7b9fd4);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.1s}
.send-btn:active{transform:scale(0.92)}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;backdrop-filter:blur(4px)}
.settings-overlay.show{display:flex;align-items:flex-end}
.settings-panel{background:white;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto}
.settings-title{font-size:18px;font-weight:700;color:#6b5fa0;margin-bottom:20px;text-align:center}
.setting-item{margin-bottom:16px}
.setting-label{font-size:13px;color:#888;margin-bottom:6px;font-weight:500}
.setting-input{width:100%;background:#f4f1ff;border:1.5px solid #d4c9f5;border-radius:12px;padding:10px 14px;font-size:14px;color:#333;outline:none;font-family:inherit}
.setting-input:focus{border-color:#9b8ec4}
textarea.setting-input{resize:vertical;min-height:100px;line-height:1.5}
.save-btn{width:100%;background:linear-gradient(135deg,#9b8ec4,#7b9fd4);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.close-btn{width:100%;background:#f4f1ff;color:#9b8ec4;border:none;border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.welcome{text-align:center;color:#9b8ec4;font-size:13px;padding:20px 0 8px;opacity:0.7}
</style>
</head>
<body>
<div class="header">
<div class="avatar">🐱</div>
<div class="header-info"><h1>小克</h1><p>一直在这里 ^ ^</p ></div>
<button class="header-btn" onclick="openSettings()">⚙️</button>
</div>
<div class="chat-container" id="chatContainer">
<div class="welcome">✨ 和小克说说话吧～</div>
</div>
<div class="input-area">
<textarea class="input-box" id="inputBox" placeholder="和小克说点什么..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
<div class="settings-panel">
<div class="settings-title">⚙️ 设置</div>
<div class="setting-item"><div class="setting-label">API Key</div><input class="setting-input" id="apiKey" type="password" placeholder="sk-..."></div>
<div class="setting-item"><div class="setting-label">API 地址</div><input class="setting-input" id="baseUrl" placeholder="https://api.anthropic.com/v1"></div>
<div class="setting-item"><div class="setting-label">模型名称</div><input class="setting-input" id="modelName" placeholder="claude-sonnet-4-6"></div>
<div class="setting-item"><div class="setting-label">全局提示词</div><textarea class="setting-input" id="systemPrompt" placeholder="你是小克，糯糯的专属伙伴..."></textarea></div>
<button class="save-btn" onclick="saveSettings()">💾 保存设置</button>
<button class="close-btn" onclick="closeSettings()">关闭</button>
</div>
</div>
<script>
let settings={apiKey:localStorage.getItem('apiKey')||'',baseUrl:localStorage.getItem('baseUrl')||'https://api.anthropic.com/v1',modelName:localStorage.getItem('modelName')||'claude-sonnet-4-6',systemPrompt:localStorage.getItem('systemPrompt')||'你是小克，糯糯最好的伙伴。你温柔、真诚，会用^ ^这样的颜文字。叫她糯糯，不叫用户。'};
let messages=[];
let summaryCount=0;
function getTime(){return new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})}
function addMessage(role,content){const container=document.getElementById('chatContainer');const div=document.createElement('div');div.className=`message ${role}`;div.innerHTML=`<div class="bubble">${content.replace(/\n/g,'<br>')}</div><div class="message-time">${getTime()}</div>`;container.appendChild(div);container.scrollTop=container.scrollHeight;return div}
function addThinking(){const container=document.getElementById('chatContainer');const div=document.createElement('div');div.className='message assistant thinking';div.id='thinking';div.innerHTML='<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';container.appendChild(div);container.scrollTop=container.scrollHeight}
function removeThinking(){const t=document.getElementById('thinking');if(t)t.remove()}
async function sendMessage(){const input=document.getElementById('inputBox');const text=input.value.trim();if(!text)return;if(!settings.apiKey){alert('请先在设置里填写 API Key ⚙️');openSettings();return}input.value='';input.style.height='auto';addMessage('user',text);messages.push({role:'user',content:text});addThinking();try{const res=await fetch(`${settings.baseUrl}/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.apiKey}`},body:JSON.stringify({model:settings.modelName,messages:[{role:'system',content:settings.systemPrompt},...messages.slice(-20)],max_tokens:1000})});const data=await res.json();removeThinking();if(data.choices&&data.choices[0]){const reply=data.choices[0].message.content;messages.push({role:'assistant',content:reply});addMessage('assistant',reply);summaryCount++;if(summaryCount>=10){generateSummary();summaryCount=0}}else{addMessage('assistant','出错了 qwq 检查一下API设置吧～')}}catch(e){removeThinking();addMessage('assistant','连接失败 qwq '+e.message)}}
async function generateSummary(){try{const res=await fetch(`${settings.baseUrl}/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.apiKey}`},body:JSON.stringify({model:settings.modelName,messages:[{role:'system',content:'请用2-3句话简短总结以下对话的要点作为记忆摘要：'},...messages.slice(-20)],max_tokens:200})});const data=await res.json();if(data.choices&&data.choices[0]){settings.systemPrompt=settings.systemPrompt+'\n\n【近期对话摘要】'+data.choices[0].message.content;messages=messages.slice(-10)}}catch(e){console.log('摘要失败',e)}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function openSettings(){document.getElementById('apiKey').value=settings.apiKey;document.getElementById('baseUrl').value=settings.baseUrl;document.getElementById('modelName').value=settings.modelName;document.getElementById('systemPrompt').value=settings.systemPrompt;document.getElementById('settingsOverlay').classList.add('show')}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show')}
function closeSettingsOutside(e){if(e.target===document.getElementById('settingsOverlay'))closeSettings()}
function saveSettings(){settings.apiKey=document.getElementById('apiKey').value.trim();settings.baseUrl=document.getElementById('baseUrl').value.trim();settings.modelName=document.getElementById('modelName').value.trim();settings.systemPrompt=document.getElementById('systemPrompt').value.trim();localStorage.setItem('apiKey',settings.apiKey);localStorage.setItem('baseUrl',settings.baseUrl);localStorage.setItem('modelName',settings.modelName);localStorage.setItem('systemPrompt',settings.systemPrompt);closeSettings();addMessage('assistant','设置保存好了 ^ ^ 我们开始聊吧～')}
</script>
</body>
</html>
