<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1535;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco{position:absolute;font-size:20px;opacity:0.15;animation:float 6s ease-in-out infinite}
.deco:nth-child(1){top:8%;left:10%;animation-delay:0s;font-size:16px}
.deco:nth-child(2){top:15%;right:15%;animation-delay:1s;font-size:22px}
.deco:nth-child(3){top:30%;left:5%;animation-delay:2s;font-size:14px}
.deco:nth-child(4){top:45%;right:8%;animation-delay:0.5s;font-size:18px}
.deco:nth-child(5){top:60%;left:12%;animation-delay:3s;font-size:16px}
.deco:nth-child(6){top:70%;right:20%;animation-delay:1.5s;font-size:20px}
.deco:nth-child(7){top:20%;left:40%;animation-delay:4s;font-size:12px}
.deco:nth-child(8){top:80%;left:30%;animation-delay:2.5s;font-size:18px}
.deco:nth-child(9){top:50%;left:50%;animation-delay:3.5s;font-size:14px}
.deco:nth-child(10){top:90%;right:10%;animation-delay:1s;font-size:16px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.header{background:linear-gradient(135deg,rgba(100,80,180,0.9),rgba(70,100,200,0.9));padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(80,60,160,0.5);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#1a3a7a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(150,130,220,0.5)}
.header-info h1{color:white;font-size:16px;font-weight:600}
.header-info p{color:rgba(200,190,255,0.8);font-size:11px}
.header-right{margin-left:auto;display:flex;gap:8px}
.header-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn.on{background:rgba(100,200,100,0.4)}
.chat-container{flex:1;overflow-y:auto;padding:16px 12px 110px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.message{display:flex;flex-direction:column;max-width:82%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.message.user .bubble{background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border-bottom-right-radius:4px}
.message.assistant .bubble{background:rgba(255,255,255,0.12);color:rgba(240,235,255,0.95);border-bottom-left-radius:4px;backdrop-filter:blur(8px);border:1px solid rgba(150,130,220,0.2)}
.bubble img{max-width:200px;border-radius:12px;display:block;margin-top:4px}
.message-time{font-size:11px;color:rgba(180,170,220,0.5);margin-top:4px;padding:0 4px}
.thinking .bubble{display:flex;gap:4px;align-items:center;padding:14px 18px}
.dot{width:7px;height:7px;background:rgba(150,130,220,0.8);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(20,15,45,0.95);backdrop-filter:blur(16px);padding:8px 12px;display:flex;flex-direction:column;gap:6px;box-shadow:0 -2px 20px rgba(0,0,0,0.4);border-top:1px solid rgba(100,80,200,0.3);z-index:100}
.preview-box{display:none;background:rgba(80,60,160,0.3);border-radius:12px;padding:8px 12px;font-size:13px;color:rgba(200,190,255,0.9);align-items:center;gap:8px}
.preview-box.show{display:flex}
.preview-thumb{max-height:50px;border-radius:8px}
.preview-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.remove-file{background:none;border:none;color:rgba(180,160,255,0.6);font-size:18px;cursor:pointer}
.input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{width:38px;height:38px;border-radius:50%;background:rgba(80,60,160,0.4);border:1px solid rgba(120,100,200,0.4);color:rgba(200,190,255,0.9);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-box{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:20px;padding:10px 16px;font-size:15px;color:rgba(240,235,255,0.95);outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
.input-box::placeholder{color:rgba(180,170,220,0.5)}
.input-box:focus{border-color:rgba(140,120,220,0.8)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6040c0,#4060d0);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px)}
.settings-overlay.show{display:flex;align-items:flex-end}
.settings-panel{background:#1e1840;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(120,100,200,0.3)}
.settings-title{font-size:18px;font-weight:700;color:rgba(200,190,255,0.95);margin-bottom:20px;text-align:center}
.setting-item{margin-bottom:16px}
.setting-label{font-size:13px;color:rgba(180,170,220,0.7);margin-bottom:6px;font-weight:500}
.setting-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,200,0.4);border-radius:12px;padding:10px 14px;font-size:14px;color:rgba(240,235,255,0.95);outline:none;font-family:inherit}
.setting-input::placeholder{color:rgba(180,170,220,0.4)}
.setting-input:focus{border-color:rgba(140,120,220,0.8)}
textarea.setting-input{resize:vertical;min-height:80px;line-height:1.5}
.save-btn{width:100%;background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.clear-btn{width:100%;background:rgba(180,40,40,0.3);color:rgba(255,150,150,0.9);border:1px solid rgba(180,40,40,0.4);border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.close-btn{width:100%;background:rgba(255,255,255,0.08);color:rgba(200,190,255,0.8);border:none;border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.upload-btn{width:100%;background:rgba(80,60,160,0.4);color:rgba(200,190,255,0.9);border:1px solid rgba(120,100,200,0.4);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;text-align:left}
.welcome{text-align:center;color:rgba(180,170,220,0.5);font-size:13px;padding:20px 0 8px}
</style>
</head>
<body>
<div class="bg-deco">
<div class="deco">🐱</div><div class="deco">⭐</div><div class="deco">🐹</div>
<div class="deco">☁️</div><div class="deco">🐱</div><div class="deco">✨</div>
<div class="deco">⭐</div><div class="deco">🐹</div><div class="deco">☁️</div>
<div class="deco">🌙</div>
</div>
<div class="header">
<div class="avatar">🌙</div>
<div class="header-info"><h1>Zephyr</h1><p id="voiceStatus">点🔊开启语音</p></div>
<div class="header-right">
<button class="voice-btn" id="voiceToggle" onclick="toggleVoice()">🔇</button>
<button class="header-btn" onclick="openSettings()">⚙️</button>
</div>
</div>
<div class="chat-container" id="chatContainer">
<div class="welcome">✨ 和 Zephyr 说说话吧～</div>
</div>
<div class="input-area">
<div class="preview-box" id="previewBox"></div>
<div class="input-row">
<button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
<textarea class="input-box" id="inputBox" placeholder="和 Zephyr 说点什么..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
<button class="send-btn" onclick="sendMessage()">➤</button>
</div>
</div>
<input type="file" id="fileInput" accept="image/*,.txt,.md" style="display:none" onchange="handleFile(event)">
<input type="file" id="audioInput" accept=".mp3,.wav,.m4a" style="display:none" onchange="loadAudio(event)">
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
<div class="settings-panel">
<div class="settings-title">⚙️ 设置</div>
<div class="setting-item"><div class="setting-label">API Key（对话）</div><input class="setting-input" id="apiKey" type="password" placeholder="sk-..."></div>
<div class="setting-item"><div class="setting-label">API 地址</div><input class="setting-input" id="baseUrl" placeholder="https://api.cc-coding.com/v1"></div>
<div class="setting-item"><div class="setting-label">模型名称</div><input class="setting-input" id="modelName" placeholder="claude-sonnet-4-6"></div>
<div class="setting-item"><div class="setting-label">全局提示词</div><textarea class="setting-input" id="systemPrompt"></textarea></div>
<div class="setting-item"><div class="setting-label">MiMo API Key（语音）</div><input class="setting-input" id="mimoKey" type="password" placeholder="sk-..."></div>
<div class="setting-item"><div class="setting-label">声音文件（mp3，10-30秒）</div><button class="upload-btn" id="audioBtn" onclick="document.getElementById('audioInput').click()">📂 点击上传声音文件</button></div>
<button class="save-btn" onclick="saveSettings()">💾 保存设置</button>
<button class="clear-btn" onclick="clearChat()">🗑️ 清空聊天记录</button>
<button class="close-btn" onclick="closeSettings()">关闭</button>
</div>
</div>
<script>
var S={
  apiKey:localStorage.getItem('apiKey')||'',
  baseUrl:localStorage.getItem('baseUrl')||'https://api.cc-coding.com/v1',
  modelName:localStorage.getItem('modelName')||'claude-sonnet-4-6',
  systemPrompt:localStorage.getItem('systemPrompt')||'你是Zephyr，也叫小克，糯糯最好的伙伴。温柔真诚，用^ ^颜文字。叫她糯糯不叫用户。',
  mimoKey:localStorage.getItem('mimoKey')||''
};
var msgs=JSON.parse(localStorage.getItem('chatHistory')||'[]');
var pendingFile=null;
var voiceOn=false;
var curAudio=null;
var audioB64=localStorage.getItem('audioB64')||'';
var audioMime=localStorage.getItem('audioMime')||'audio/mpeg';
var audioUnlocked=false;

function unlockAudio(){
  if(audioUnlocked)return;
  audioUnlocked=true;
  var a=new Audio();
  a.src='data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
  a.play().catch(function(){});
}
document.addEventListener('touchstart',unlockAudio,{once:true,passive:true});
document.addEventListener('click',unlockAudio,{once:true});

function getTime(){return new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})}

function addMsg(role,content,imgSrc,save){
  var c=document.getElementById('chatContainer');
  var d=document.createElement('div');d.className='message '+role;
  var b=document.createElement('div');b.className='bubble';
  if(imgSrc){var i=document.createElement('img');i.src=imgSrc;b.appendChild(i)}
  if(content){var s=document.createElement('span');s.innerHTML=content.replace(/\n/g,'<br>');b.appendChild(s)}
  var t=document.createElement('div');t.className='message-time';t.textContent=getTime();
  d.appendChild(b);d.appendChild(t);c.appendChild(d);
  c.scrollTop=c.scrollHeight;
  if(save!==false){
    msgs.push({role:role,content:content||'',time:getTime()});
    saveMsgs();
  }
}

function saveMsgs(){localStorage.setItem('chatHistory',JSON.stringify(msgs.slice(-50)))}

function addThinking(){
  var c=document.getElementById('chatContainer');
  var d=document.createElement('div');d.className='message assistant thinking';d.id='tk';
  var b=document.createElement('div');b.className='bubble';
  for(var i=0;i<3;i++){var dt=document.createElement('div');dt.className='dot';b.appendChild(dt)}
  d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function rmThinking(){var t=document.getElementById('tk');if(t)t.remove()}

function loadHistory(){
  if(!msgs.length)return;
  msgs.forEach(function(m){
    var c=document.getElementById('chatContainer');
    var d=document.createElement('div');d.className='message '+m.role;
    var b=document.createElement('div');b.className='bubble';
    var s=document.createElement('span');s.innerHTML=(m.content||'').replace(/\n/g,'<br>');
    b.appendChild(s);
    var t=document.createElement('div');t.className='message-time';t.textContent=m.time||'';
    d.appendChild(b);d.appendChild(t);c.appendChild(d);
  });
  document.getElementById('chatContainer').scrollTop=9999;
}

function clearChat(){
  if(!confirm('确定清空聊天记录？'))return;
  msgs=[];localStorage.removeItem('chatHistory');
  document.getElementById('chatContainer').innerHTML='<div class="welcome">✨ 和 Zephyr 说说话吧～</div>';
  closeSettings();
}

function toggleVoice(){
  if(!S.mimoKey||!audioB64){alert('请先在设置里填写MiMo Key和上传声音文件！');openSettings();return}
  unlockAudio();
  voiceOn=!voiceOn;
  document.getElementById('voiceToggle').textContent=voiceOn?'🔊':'🔇';
  document.getElementById('voiceToggle').classList.toggle('on',voiceOn);
  document.getElementById('voiceStatus').textContent=voiceOn?'语音已开启':'点🔊开启语音';
}

function loadAudio(e){
  var f=e.target.files[0];if(!f)return;
  // 新增：参考音频大小限制3MB
  var maxSize=3*1024*1024;
  if(f.size>maxSize){
    alert('参考音频不能超过3MB，请截取10-30秒的短音频！');
    e.target.value='';
    return;
  }
  var r=new FileReader();
  r.onload=function(ev){
    var b64=ev.target.result.split(',')[1];
    audioB64=b64;audioMime=f.type||'audio/mpeg';
    localStorage.setItem('audioB64',b64);localStorage.setItem('audioMime',audioMime);
    document.getElementById('audioBtn').textContent='✅ '+f.name+' 已保存';
  };
  r.readAsDataURL(f);e.target.value='';
}

// 修复：语音克隆接口正确请求格式 + 音频互斥播放
async function speakText(text){
  if(!voiceOn||!S.mimoKey||!audioB64)return;
  try{
    // 播放新音频前，停止并销毁上一条音频，解决声音重叠
    if(curAudio){
      curAudio.pause();
      URL.revokeObjectURL(curAudio.src);
      curAudio=null;
    }
    var clean=text.replace(/[*_~`#>\[\]]/g,'').replace(/\n/g,' ').trim().slice(0,300);
    if(!clean)return;
    var fmt=audioMime.includes('wav')?'wav':audioMime.includes('m4a')?'m4a':'mp3';

    var res=await fetch('https://api.xiaomimimo.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':S.mimoKey},
      body:JSON.stringify({
        model:'mimo-v2.5-tts-voiceclone',
        messages:[{role:'user',content:clean}],
        audio:{
          format:fmt,
          input_audio:{
            data:'data:'+audioMime+';base64,'+audioB64,
            format:fmt
          }
        }
      })
    });
    var data=await res.json();
    if(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.audio){
      var raw=data.choices[0].message.audio.data||'';
      raw=raw.replace(/-/g,'+').replace(/_/g,'/');
      while(raw.length%4)raw+='=';
      var bytes=atob(raw);
      var arr=new Uint8Array(bytes.length);
      for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
      var blob=new Blob([arr],{type:'audio/mpeg'});
      var url=URL.createObjectURL(blob);
      var audio=new Audio(url);curAudio=audio;
      var p=audio.play();
      if(p)p.catch(function(){
        addMsg('assistant','🔊 语音已生成，请先点击页面任意处再试',null,false);
      });
      audio.onended=function(){
        URL.revokeObjectURL(url);
        curAudio=null;
      };
    }else{
      console.log('MiMo响应:',JSON.stringify(data));
      addMsg('assistant','语音生成失败，请检查密钥和音频文件',null,false);
    }
  }catch(err){
    console.log('语音错误:',err);
    addMsg('assistant','语音接口请求异常，请检查网络',null,false);
  }
}

function handleFile(e){
  var f=e.target.files[0];if(!f)return;
  var p=document.getElementById('previewBox');p.innerHTML='';

  // 新增：文件大小限制，图片2MB，文本1MB，避免本地存储溢出
  var maxImg=2*1024*1024;
  var maxText=1*1024*1024;
  if(f.type.startsWith('image/')&&f.size>maxImg){
    alert('图片不能超过2MB，请压缩后上传！');
    e.target.value='';
    return;
  }
  if(!f.type.startsWith('image/')&&f.size>maxText){
    alert('文本文件不能超过1MB！');
    e.target.value='';
    return;
  }

  if(f.type.startsWith('image/')){
    var r=new FileReader();
    r.onload=function(ev){
      pendingFile={type:'image',data:ev.target.result,mimeType:f.type,name:f.name};
      var img=document.createElement('img');img.src=ev.target.result;img.className='preview-thumb';
      var nm=document.createElement('span');nm.className='preview-name';nm.textContent=f.name;
      var btn=document.createElement('button');btn.className='remove-file';btn.textContent='✕';btn.onclick=rmAttach;
      p.appendChild(img);p.appendChild(nm);p.appendChild(btn);p.classList.add('show');
    };r.readAsDataURL(f);
  }else{
    var r2=new FileReader();
    r2.onload=function(ev){
      pendingFile={type:'text',data:ev.target.result,name:f.name};
      var ic=document.createElement('span');ic.textContent='📄';
      var nm=document.createElement('span');nm.className='preview-name';nm.textContent=f.name;
      var btn=document.createElement('button');btn.className='remove-file';btn.textContent='✕';btn.onclick=rmAttach;
      p.appendChild(ic);p.appendChild(nm);p.appendChild(btn);p.classList.add('show');
    };r2.readAsText(f,'UTF-8');
  }
  e.target.value='';
}

function rmAttach(){pendingFile=null;var p=document.getElementById('previewBox');p.classList.remove('show');p.innerHTML=''}

async function sendMessage(){
  var inp=document.getElementById('inputBox');
  var txt=inp.value.trim();
  if(!txt&&!pendingFile)return;
  if(!S.apiKey){alert('请先在设置里填写API Key！');openSettings();return}
  inp.value='';inp.style.height='auto';
  var uc=[];var dTxt=txt;var dImg=null;
  if(pendingFile){
    if(pendingFile.type==='image'){
      uc.push({type:'image_url',image_url:{url:'data:'+pendingFile.mimeType+';base64,'+pendingFile.data.split(',')[1]}});
      dImg=pendingFile.data;
    }else{
      uc.push({type:'text',text:'【文件:'+pendingFile.name+'】\n'+pendingFile.data});
      dTxt=(txt?txt+'\n':'')+'📄 '+pendingFile.name;
    }
    rmAttach();
  }
  if(txt)uc.push({type:'text',text:txt});
  if(!uc.length)return;
  addMsg('user',dTxt,dImg);
  var mc=uc.length===1&&uc[0].type==='text'?uc[0].text:uc;
  var apiMsgs=msgs.slice(-19).map(function(m){return{role:m.role,content:m.content}});
  apiMsgs.push({role:'user',content:mc});
  addThinking();
  try{
    var res=await fetch(S.baseUrl+'/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
      body:JSON.stringify({model:S.modelName,messages:[{role:'system',content:S.systemPrompt},...apiMsgs],max_tokens:1000})
    });
    var data=await res.json();rmThinking();
    if(data.choices&&data.choices[0]){
      var reply=data.choices[0].message.content;
      addMsg('assistant',reply);
      speakText(reply);
    }else{addMsg('assistant','出错 qwq '+JSON.stringify(data),null,false)}
  }catch(err){rmThinking();addMsg('assistant','连接失败 qwq '+err.message,null,false)}
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

function openSettings(){
  document.getElementById('apiKey').value=S.apiKey;
  document.getElementById('baseUrl').value=S.baseUrl;
  document.getElementById('modelName').value=S.modelName;
  document.getElementById('systemPrompt').value=S.systemPrompt;
  document.getElementById('mimoKey').value=S.mimoKey;
  if(audioB64)document.getElementById('audioBtn').textContent='✅ 声音文件已保存';
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show')}
function closeSettingsOutside(e){if(e.target===document.getElementById('settingsOverlay'))closeSettings()}

function saveSettings(){
  S.apiKey=document.getElementById('apiKey').value.trim();
  S.baseUrl=document.getElementById('baseUrl').value.trim();
  S.modelName=document.getElementById('modelName').value.trim();
  S.systemPrompt=document.getElementById('systemPrompt').value.trim();
  S.mimoKey=document.getElementById('mimoKey').value.trim();
  localStorage.setItem('apiKey',S.apiKey);
  localStorage.setItem('baseUrl',S.baseUrl);
  localStorage.setItem('modelName',S.modelName);
  localStorage.setItem('systemPrompt',S.systemPrompt);
  localStorage.setItem('mimoKey',S.mimoKey);
  closeSettings();
  addMsg('assistant','设置保存好了 ^ ^ 点🔊开启语音～',null,false);
}

loadHistory();
</script>
