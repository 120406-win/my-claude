<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zephyr</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1535;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.deco{position:absolute;font-size:20px;opacity:0.15;animation:float 6s ease-in-out infinite}
.deco:nth-child(1){top:8%;left:10%;animation-delay:0s;font-size:16px}
.deco:nth-child(2){top:15%;right:15%;animation-delay:1s;font-size:22px}
.deco:nth-child(3){top:30%;left:5%;animation-delay:2s;font-size:14px}
.deco:nth-child(4){top:45%;right:8%;animation-delay:0.5s;font-size:18px}
.deco:nth-child(5){top:60%;left:12%;animation-delay:3s;font-size:16px}
.deco:nth-child(6){top:70%;right:20%;animation-delay:1.5s;font-size:20px}
.deco:nth-child(7){top:20%;left:40%;animation-delay:4s;font-size:12px}
.deco:nth-child(8){top:80%;left:30%;animation-delay:2.5s;font-size:18px}
.deco:nth-child(9){top:50%;left:50%;animation-delay:3.5s;font-size:14px}
.deco:nth-child(10){top:90%;right:10%;animation-delay:1s;font-size:16px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.header{background:linear-gradient(135deg,rgba(100,80,180,0.9),rgba(70,100,200,0.9));padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(80,60,160,0.5);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#1a3a7a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid rgba(150,130,220,0.5)}
.header-info h1{color:white;font-size:16px;font-weight:600}
.header-info p{color:rgba(200,190,255,0.8);font-size:11px}
.header-right{margin-left:auto;display:flex;gap:8px}
.header-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn{background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.voice-btn.on{background:rgba(100,200,100,0.4)}
.chat-container{flex:1;overflow-y:auto;padding:16px 12px 110px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.message{display:flex;flex-direction:column;max-width:82%}
.message.user{align-self:flex-end;align-items:flex-end}
.message.assistant{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.message.user .bubble{background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border-bottom-right-radius:4px}
.message.assistant .bubble{background:rgba(255,255,255,0.12);color:rgba(240,235,255,0.95);border-bottom-left-radius:4px;backdrop-filter:blur(8px);border:1px solid rgba(150,130,220,0.2)}
.bubble img{max-width:200px;border-radius:12px;display:block;margin-top:4px}
.message-time{font-size:11px;color:rgba(180,170,220,0.5);margin-top:4px;padding:0 4px}
.thinking .bubble{display:flex;gap:4;align-items:center;padding:14px 18px}
.dot{width:7px;height:7px;background:rgba(150,130,220,0.8);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(20,15,45,0.95);backdrop-filter:16px;padding:8px 12px;display:flex;flex-direction:column;gap:6px;box-shadow:0 -2px 20px rgba(0,0,0.4);border-top:1px solid rgba(100,80,200,0.3);z-index:100}
.preview-box{display:none;background:rgba(80,60,160,0.3);border-radius:12px;padding:8px 12px;font-size:13px;color:rgba(200,190,255,0.9);align-items:center;gap:8px}
.preview-box.show{display:flex}
.preview-thumb{max-height:50px;border-radius:8px}
.preview-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.remove-file{background:none;border:none;color:rgba(180,160,255,0.6);font-size:18px;cursor:pointer}
.input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{width:38px;height:38px;border-radius:50%;background:rgba(80,60,160,0.4);border:1px solid rgba(120,100,200,0.4);color:rgba(200,190,255,0.9);font-size:16px;cursor:pointer;display:flex;align-items:center;flex-shrink:0}
.input-box{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,0.4);border-radius:20px;padding:10px 16px;font-size:15px;color:rgba(240,235,255,0.95);outline:none;resize:none;max-height:120px;overflow-y:auto;line-height:1.4;font-family:inherit}
.input-box::placeholder{color:rgba(180,170,255,0.5)}
.input-box:focus{border-color:rgba(140,120,220,0.8)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6040c0,#4060d0);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0.6);z-index:200;backdrop-filter:4px}
.settings-overlay.show{display:flex;align-items:flex-end}
.settings-panel{background:#1e1840;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:85vh;overflow-y:auto;border-top:1px solid rgba(120,100,0.3)}
.settings-title{font-size:18px;font-weight:700;color:rgba(200,190,255,0.95);margin-bottom:20px;text-align:center}
.setting-item{margin-bottom:16px}
.setting-label{font-size:13px;color:rgba(180,170,220,0.7);margin-bottom:6px;font-weight:500}
.setting-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(120,100,0.4);border-radius:12px;padding:10px 14px;font-size:14px;color:rgba(240,235,255,0.95);outline:none;font-family:inherit}
.setting-input::placeholder{color:rgba(180,170,0.4)}
.setting-input:focus{border-color:rgba(140,120,220,0.8)}
textarea.setting-input{resize:vertical;min-height:80px;line-height:1.5}
.save-btn{width:100%;background:linear-gradient(135deg,#6040c0,#4060d0);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.test-btn{width:100%;background:rgba(80,160,120,0.3);color:#a8e9d0;border:1px solid rgba(80,160,120,0.4);border-radius:14px;padding:10px;font-size:14px;cursor:pointer;margin-top:6px}
.clear-a-btn{width:100%;background:rgba(160,120,60,0.3);color:#ffe2b0;border:1px solid rgba(160,120,0.4);border-radius:14px;padding:10px;font-size:14px;cursor:pointer;margin-top:6px}
.clear-all-btn{width:100%;background:rgba(120,60,160,0.3);color:#e0c8ff;border:1px solid rgba(120,60,160,0.4);border-radius:14px;padding:10px;font-size:14px;cursor:pointer;margin-top:6px}
.clear-btn{width:100%;background:rgba(180,40,0.3);color:rgba(255,150,150,0.9);border:1px solid rgba(180,40,0.4);border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.close-btn{width:100%;background:rgba(255,255,255,0.08);color:rgba(200,190,255,0.8);border:none;border-radius:14px;padding:12px;font-size:15px;cursor:pointer;margin-top:8px}
.upload-btn{width:100%;background:rgba(80,60,160,0.4);color:rgba(200,190,255,0.9);border:1px solid rgba(120,100,0.4);border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;text-align:left}
.welcome{text-align:center;color:rgba(180,170,255,0.5);font-size:13px;padding:20px 0 8px}
.help-text{color:rgba(180,170,255,0.4);font-size:11px;margin-top:4px}
</style>
</head>
<body>
<div class="bg-deco">
  <div class="deco">🐱</div><div class="deco">⭐</div><div class="deco">🐹</div>
  <div class="deco">☁️</div><div class="deco">🐱</div><div class="deco">✨</div>
  <div class="deco">⭐</div><div class="deco">🐹</div><div class="deco">☁️</div>
  <div class="deco">🌙</div>
</div>
<div class="header">
  <div class="avatar">🌙</div>
  <div class="header-info">
    <h1>Zephyr</h1>
    <p id="voiceStatus">点🔊开启语音</p>
  </div>
  <div class="header-right">
    <button class="voice-btn" id="voiceToggle" onclick="toggleVoice()">🔇</button>
    <button class="header-btn" onclick="openSettings()">⚙️</button>
  </div>
</div>
<div class="chat-container" id="chatContainer">
  <div class="welcome">✨ 和 Zephyr 说说话吧～</div>
</div>
<div class="input-area">
  <div class="preview-box" id="previewBox"></div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <textarea class="input-box" id="inputBox" placeholder="和 Zephyr 说点什么..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*,.txt,.md" style="display:none" onchange="handleFile(event)">
<input type="file" id="audioInput" accept=".mp3,.wav,.m4a" style="display:none" onchange="loadAudio(event)">
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <div class="settings-title">⚙️ 设置</div>
    <div class="setting-item">
      <div class="setting-label">对话 API Key</div>
      <input class="setting-input" id="apiKey" type="password" placeholder="sk-...">
    </div>
    <div class="setting-item">
      <div class="setting-label">对话 API 地址</div>
      <input class="setting-input" id="baseUrl" placeholder="https://api.cc-coding.com/v1">
    </div>
    <div class="setting-item">
      <div class="setting-label">模型名称</div>
      <input class="setting-input" id="modelName" placeholder="claude-sonnet-4-6">
    </div>
    <div class="setting-item">
      <div class="setting-label">全局系统提示词</div>
      <textarea class="setting-input" id="systemPrompt"></textarea>
    </div>
    <div class="setting-item" style="border-top:1px solid rgba(120,100,0.2);padding-top:12px;margin-top:4px;">
      <div class="setting-label" style="color:rgba(200,190,255,0.9);font-weight:600;">🎤 语音设置</div>
    </div>
    <div class="setting-item">
      <div class="setting-label">语音模式</div>
      <select class="setting-input" id="voiceMode" style="appearance:auto;">
        <option value="browser">iOS 系统语音（推荐，免密钥/无后端）</option>
        <option value="mimo">MiMo 克隆音色（需Railway/本地后端）</option>
      </select>
    </div>
    <div class="setting-item" id="proxyWrap">
      <div class="setting-label">后端代理地址（Railway公网/电脑局域网IP）</div>
      <input class="setting-input" id="proxyUrl" placeholder="https://xxx.railway.app/api/tts">
      <button class="test-btn" onclick="testProxy()">🔍 测试代理连通性</button>
      <div class="help-text">克隆音色模式填写后端公网地址，系统语音无需填写</div>
    </div>
    <div class="setting-item" id="audioWrap">
      <div class="setting-label">音色参考音频（mp3/wav/m4a，10-30秒，≤3MB）</div>
      <button class="upload-btn" id="audioBtn" onclick="document.getElementById('audioInput').click()">📂 上传音色文件</button>
      <div class="help-text" id="audioStatus">未上传</div>
      <button class="clear-a-btn" onclick="clearAudio()">🗑️ 清空本地音色缓存</button>
      <button class="clear-all-btn" onclick="clearAllStorage()">🧹 清空全部本地缓存</button>
    </div>
    <button class="save-btn" onclick="saveSettings()">💾 保存全部设置</button>
    <button class="clear-btn" onclick="clearChat()">🗑️ 清空聊天记录</button>
    <button class="close-btn" onclick="closeSettings()">关闭</button>
  </div>
</div>
<script>
// 线上调试：URL拼接 ?debug=1 自动开启日志
const urlParams = new URLSearchParams(window.location.search);
const IS_DEBUG_URL = urlParams.get('debug') === '1';

// ======================== 全局统一常量 ========================
const CONST = {
  DEBUG_LOG: IS_DEBUG_URL || false,
  MAX_AUDIO_SIZE: 3 * 1024 * 1024,
  SAFE_LOCAL_AUDIO_MAX: 1.5 * 1024 * 1024,
  DIALOG_TIMEOUT: 15000,
  TTS_TIMEOUT: 30000,
  MAX_HISTORY: 50,
  MAX_IMG_SIZE: 2 * 1024 * 1024,
  MAX_TXT_FILE: 1 * 1024,
  TEXT_TRUNCATE_LEN: 500,
  TTS_MODEL: "mimo-v2.5-tts-voiceclone",
  DEFAULT_PROXY: "https://xxx.railway.app/api/tts",
  MIN_AUDIO_SEC: 10,
  MAX_AUDIO_SEC: 30,
  TEXT_LIMIT: 300,
  LS_TOTAL_LIMIT: 5 * 1024 * 1024,
  IDLE_RELEASE_DELAY: 30000,
  FETCH_RETRY_COUNT: 1
};

// ======================== 通用工具 ========================
function log(...args) {
  if (CONST.DEBUG_LOG) console.log(...args);
}

// 仅外部不可控内容转义（文件名、接口报错），聊天内容不转义保留颜文字
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// 纯文本渲染，天然防注入，不二次转义聊天内容
function safeText(rawText) {
  const wrapper = document.createElement('span');
  const lines = rawText.split('\n');
  lines.forEach((line, idx) => {
    wrapper.appendChild(document.createTextNode(line));
    if (idx < lines.length - 1) wrapper.appendChild(document.createElement('br'));
  });
  return wrapper;
}

function getLocalStorageUsed() {
  let total = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) total += (localStorage[k].length + k.length) * 2;
  }
  return total;
}

// 空间不足自动裁剪+友好提示
function checkStorageSpace(fileByte = 0) {
  const used = getLocalStorageUsed();
  const remain = CONST.LS_TOTAL_LIMIT - used;
  if (remain < fileByte + 512 * 1024) {
    const historyRaw = JSON.parse(localStorage.getItem('chatHistory') || '[]');
    const halfLen = Math.floor(historyRaw.length / 2);
    localStorage.setItem('chatHistory', JSON.stringify(historyRaw.slice(0, halfLen)));
    alert(`本地存储空间不足，自动删减一半聊天记录，仅保留最近${halfLen}条，请重新上传音频`);
    return false;
  }
  return true;
}

function getTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// ======================== 全局状态 ========================
let state = {
  msgs: JSON.parse(localStorage.getItem('chatHistory') || '[]'),
  pendingFile: null,
  voiceOn: localStorage.getItem('voiceSwitch') === 'true',
  curAudio: null,
  audioB64: localStorage.getItem('audioB64') || '',
  audioMime: localStorage.getItem('audioMime') || 'audio/mpeg',
  audioUnlocked: false,
  isSpeaking: false,
  audioUrl: null,
  idleTimer: null,
  isAudioPersisted: !!localStorage.getItem('audioB64')
};

// DOM缓存
const $ = {
  chat: document.getElementById('chatContainer'),
  input: document.getElementById('inputBox'),
  voiceToggle: document.getElementById('voiceToggle'),
  voiceStatus: document.getElementById('voiceStatus'),
  overlay: document.getElementById('settingsOverlay'),
  proxyUrl: document.getElementById('proxyUrl'),
  voiceMode: document.getElementById('voiceMode'),
  audioBtn: document.getElementById('audioBtn'),
  audioStatus: document.getElementById('audioStatus'),
  audioWrap: document.getElementById('audioWrap'),
  proxyWrap: document.getElementById('proxyWrap'),
  preview: document.getElementById('previewBox')
};

// 配置读取
let config = {
  apiKey: localStorage.getItem('apiKey') || '',
  baseUrl: localStorage.getItem('baseUrl') || 'https://api.cc-coding.com/v1',
  modelName: localStorage.getItem('modelName') || 'claude-sonnet-4-6',
  systemPrompt: localStorage.getItem('systemPrompt') || '你是Zephyr，温柔软糯，多用^ ^颜文字，称呼用户糯糯。',
  voiceMode: localStorage.getItem('voiceMode') || 'browser',
  proxyUrl: localStorage.getItem('proxyUrl') || CONST.DEFAULT_PROXY
};

// ======================== 音频资源管理 ========================
function disposeAudio() {
  if (state.curAudio) { state.curAudio.pause(); state.curAudio = null; }
  if (state.audioUrl) { URL.revokeObjectURL(state.audioUrl); state.audioUrl = null; }
}

function scheduleIdleRelease() {
  clearTimeout(state.idleTimer);
  state.idleTimer = setTimeout(() => {
    if (!state.curAudio) {
      state.audioB64 = '';
      state.audioMime = '';
    }
  }, CONST.IDLE_RELEASE_DELAY);
}

// 页面切回前台自动重载本地音色
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (!state.audioB64 && localStorage.getItem('audioB64')) {
      state.audioB64 = localStorage.getItem('audioB64');
      state.audioMime = localStorage.getItem('audioMime');
      state.isAudioPersisted = true;
    }
  } else {
    disposeAudio();
    clearTimeout(state.idleTimer);
  }
});

// ======================== 聊天DOM操作 ========================
function addMsg(role, content, imgSrc, save = true) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    bubble.appendChild(img);
  }
  if (content) bubble.appendChild(safeText(content));
  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = getTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  $.chat.appendChild(wrap);
  $.chat.scrollTop = $.chat.scrollHeight;
  if (save) {
    state.msgs.push({ role, content, time: getTime() });
    saveMsgs();
  }
  scheduleIdleRelease();
}

function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'message assistant thinking';
  wrap.id = 'tkLoading';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    bubble.appendChild(dot);
  }
  wrap.appendChild(bubble);
  $.chat.appendChild(wrap);
  $.chat.scrollTop = $.chat.scrollHeight;
}

function rmThinking() {
  const el = document.getElementById('tkLoading');
  if (el) el.remove();
}

function loadHistory() {
  if (!state.msgs.length) return;
  $.chat.querySelector('.welcome')?.remove();
  state.msgs.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = `message ${item.role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.appendChild(safeText(item.content));
    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = item.time;
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    $.chat.appendChild(wrap);
  });
  $.chat.scrollTop = $.chat.scrollHeight;
}

function saveMsgs() {
  const arr = state.msgs.slice(-CONST.MAX_HISTORY);
  localStorage.setItem('chatHistory', JSON.stringify(arr));
}

function clearChat() {
  if (!confirm('确定清空全部聊天记录？不可恢复')) return;
  state.msgs = [];
  localStorage.removeItem('chatHistory');
  $.chat.innerHTML = '<div class="welcome">✨ 和 Zephyr 说说话吧～</div>';
  closeSettings();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ======================== iOS 音频解锁 ========================
function unlockAudio() {
  if (state.audioUnlocked) return;
  state.audioUnlocked = true;
  const tempAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
  tempAudio.play().catch(() => {});
  if (window.speechSynthesis) {
    const utt = new SpeechSynthesisUtterance(' ');
    utt.lang = 'zh-CN';
    window.speechSynthesis.speak(utt);
    window.speechSynthesis.cancel();
  }
}
document.addEventListener('touchstart', unlockAudio, { passive: true });
document.addEventListener('click', unlockAudio, { passive: true });

// ======================== 系统语音（异步加载兜底） ========================
function fallbackSpeech(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const runSpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const zh = voices.find(v => v.lang.startsWith('zh'));
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'zh-CN';
    utt.rate = 0.9;
    utt.pitch = 1.0;
    if (zh) utt.voice = zh;
    window.speechSynthesis.speak(utt);
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) runSpeak();
  else window.speechSynthesis.onvoiceschanged = runSpeak;
}

// ======================== 带重试请求封装 ========================
async function fetchWithRetry(reqOpt, retry = 0) {
  try {
    const res = await fetch(reqOpt);
    return res;
  } catch (err) {
    if (retry < CONST.FETCH_RETRY_COUNT) {
      return fetchWithRetry(reqOpt, retry + 1);
    }
    throw err;
  }
}

// ======================== TTS 请求 ========================
async function requestTTS(text, audioB64, audioMime) {
  const payload = {
    model: CONST.TTS_MODEL,
    messages: [{ role: "user", content: "请用上传音频的音色温柔朗读以下文字" }, { role: "assistant", content: text }],
    audio: { format: "mp3" }
  };
  if (audioB64) payload.audio.voice = `data:${audioMime};base64,${audioB64}`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), CONST.TTS_TIMEOUT);
  try {
    const res = await fetchWithRetry({
      url: config.proxyUrl,
      method: 'POST',
      mode: 'cors',
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    clearTimeout(timer);
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) return { ok: false, err: 'MiMo密钥无效，请重新填写' };
      if (res.status === 400) return { ok: false, err: '音频时长/格式不符合要求' };
      if (res.status >= 500) return { ok: false, err: 'MiMo服务器异常' };
      return { ok: false, err: `HTTP状态码${res.status}` };
    }
    if (data.error) return { ok: false, err: `接口错误：${escapeHtml(data.error.message || data.error)}` };
    if (!data.choices) return { ok: false, err: '接口无返回音频' };
    return { ok: true, data };
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') return { ok: false, err: '请求超时，检查网络/后端' };
    if (e.name === 'TypeError') return { ok: false, err: '跨域拦截/后端未启动' };
    return { ok: false, err: `网络异常：${escapeHtml(e.message)}` };
  }
}

// ======================== 朗读入口 ========================
async function speakText(text) {
  if (!state.voiceOn || state.isSpeaking) return;
  let clean = text.replace(/[*_~`#>\[\]]/g, ' ').trim().slice(0, CONST.TEXT_LIMIT);
  if (!clean) return;
  if (config.voiceMode === 'browser') {
    fallbackSpeech(clean);
    return;
  }
  // 内存丢失自动从本地重载音色
  if (!state.audioB64 && localStorage.getItem('audioB64')) {
    state.audioB64 = localStorage.getItem('audioB64');
    state.audioMime = localStorage.getItem('audioMime');
    state.isAudioPersisted = true;
  }
  if (!state.audioB64) {
    addMsg('assistant', '未上传音色，自动切换系统语音', null, false);
    fallbackSpeech(clean);
    return;
  }
  if (!config.proxyUrl.trim()) {
    addMsg('assistant', '代理地址为空，请填写Railway/电脑IP', null, false);
    fallbackSpeech(clean);
    return;
  }
  disposeAudio();
  state.isSpeaking = true;
  const ret = await requestTTS(clean, state.audioB64, state.audioMime);
  state.isSpeaking = false;
  if (!ret.ok) {
    addMsg('assistant', `TTS失败：${ret.err}，切换系统语音`, null, false);
    fallbackSpeech(clean);
    return;
  }
  const audioRaw = ret.data.choices[0].message?.audio?.data;
  if (!audioRaw) {
    addMsg('assistant', '未返回音频流，请更换10-30秒音色', null, false);
    fallbackSpeech(clean);
    return;
  }
  let b64Fix = audioRaw.replace(/-/g, '+').replace(/_/g, '/');
  while (b64Fix.length % 4) b64Fix += '=';
  try {
    const buf = atob(b64Fix);
    const arr = Uint8Array.from([...buf].map(c => c.charCodeAt(0)));
    const blob = new Blob([arr], { type: 'audio/mpeg' });
    state.audioUrl = URL.createObjectURL(blob);
    state.curAudio = new Audio(state.audioUrl);
    state.curAudio.play().catch(() => addMsg('assistant', '点击屏幕解锁音频', null, false));
    state.curAudio.onended = () => {
      disposeAudio();
      scheduleIdleRelease();
    };
  } catch (e) {
    addMsg('assistant', '音频解码失败，更换音色', null, false);
    fallbackSpeech(clean);
  }
}

// ======================== 语音开关 ========================
function toggleVoice() {
  unlockAudio();
  state.voiceOn = !state.voiceOn;
  localStorage.setItem('voiceSwitch', state.voiceOn);
  $.voiceToggle.textContent = state.voiceOn ? '🔊' : '🔇';
  $.voiceToggle.classList.toggle('on', state.voiceOn);
  $.voiceStatus.textContent = state.voiceOn ? (config.voiceMode === 'browser' ? '系统语音' : '克隆语音') : '点🔊开启语音';
  if (state.voiceOn && config.voiceMode === 'browser') fallbackSpeech('语音已开启');
}

// ======================== 音色上传 ========================
function loadAudio(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (file.size > CONST.MAX_AUDIO_SIZE) {
    alert(`音频不能超过${CONST.MAX_AUDIO_SIZE / 1024 / 1024}MB`);
    return;
  }
  const allow = ['audio/mpeg','audio/wav','audio/x-wav','audio/m4a','audio/mp4'];
  if (!allow.includes(file.type)) {
    alert('仅支持mp3/wav/m4a');
    return;
  }
  const temp = new Audio(URL.createObjectURL(file));
  temp.onloadedmetadata = () => {
    const dur = temp.duration;
    URL.revokeObjectURL(temp.src);
    if (dur < CONST.MIN_AUDIO_SEC || dur > CONST.MAX_AUDIO_SEC) {
      alert(`音频时长${CONST.MIN_AUDIO_SEC}-${CONST.MAX_AUDIO_SEC}秒`);
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      const full = ev.target.result;
      const b64 = full.split(',')[1];
      if (file.size > CONST.SAFE_LOCAL_AUDIO_MAX) {
        state.audioB64 = b64;
        state.audioMime = file.type;
        state.isAudioPersisted = false;
        $.audioBtn.textContent = `临时加载：${escapeHtml(file.name)}`;
        $.audioStatus.textContent = '超大音频，刷新丢失';
        alert('音频超过1.5MB，不会本地保存');
      } else {
        if (!checkStorageSpace(file.size)) return;
        state.audioB64 = b64;
        state.audioMime = file.type;
        state.isAudioPersisted = true;
        localStorage.setItem('audioB64', b64);
        localStorage.setItem('audioMime', file.type);
        $.audioBtn.textContent = `已保存：${escapeHtml(file.name)}`;
        $.audioStatus.textContent = `时长${dur.toFixed(1)}秒，刷新不丢失`;
      }
      scheduleIdleRelease();
    };
    reader.readAsDataURL(file);
  };
}

function clearAudio() {
  state.audioB64 = '';
  state.audioMime = '';
  state.isAudioPersisted = false;
  localStorage.removeItem('audioB64');
  localStorage.removeItem('audioMime');
  disposeAudio();
  $.audioBtn.textContent = '📂 上传音色文件';
  $.audioStatus.textContent = '未上传';
  alert('音色缓存已清空');
}

// ======================== 附件处理（文件名转义+文本截断） ========================
function handleFile(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  $.preview.innerHTML = '';
  $.preview.classList.remove('show');
  if (file.type.startsWith('image') && file.size > CONST.MAX_IMG_SIZE) {
    alert('图片最大2MB');
    return;
  }
  if (!file.type.startsWith('image') && file.size > CONST.MAX_TXT_FILE * 1024) {
    alert('文本最大1MB');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    if (file.type.startsWith('image')) {
      state.pendingFile = { type:'image', data:ev.target.result, name:escapeHtml(file.name) };
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'preview-thumb';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = escapeHtml(file.name);
      const del = document.createElement('button');
      del.className = 'remove-file';
      del.textContent = '✕';
      del.onclick = clearAttach;
      $.preview.append(img, nameSpan, del);
    } else {
      let rawText = ev.target.result;
      if (rawText.length > CONST.TEXT_TRUNCATE_LEN) rawText = rawText.slice(0, CONST.TEXT_TRUNCATE_LEN) + '...';
      state.pendingFile = { type:'text', data:rawText, name:escapeHtml(file.name) };
      const icon = document.createElement('span');
      icon.textContent = '📄';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = escapeHtml(file.name);
      const del = document.createElement('button');
      del.className = 'remove-file';
      del.textContent = '✕';
      del.onclick = clearAttach;
      $.preview.append(icon, nameSpan, del);
    }
    $.preview.classList.add('show');
  };
  if (file.type.startsWith('image')) reader.readAsDataURL(file);
  else reader.readAsText(file, 'UTF-8');
}

function clearAttach() {
  state.pendingFile = null;
  $.preview.classList.remove('show');
  $.preview.innerHTML = '';
}

// ======================== 发送消息 ========================
async function sendMessage() {
  const text = $.input.value.trim();
  if (!text && !state.pendingFile) return;
  if (!config.apiKey) {
    alert('请填写对话API Key');
    openSettings();
    return;
  }
  $.input.value = '';
  $.input.style.height = 'auto';
  let userShow = text;
  let userImg = null;
  let blocks = [];
  if (state.pendingFile) {
    if (state.pendingFile.type === 'image') {
      blocks.push({ type:'image_url', image_url:{url:state.pendingFile.data} });
      userImg = state.pendingFile.data;
      userShow = `${text}\n[图片：${state.pendingFile.name}]`;
    } else {
      blocks.push({ type:'text', text:`【文件${state.pendingFile.name}】\n${state.pendingFile.data}` });
      userShow = `${text}\n📄 ${state.pendingFile.name}`;
    }
    clearAttach();
  }
  if (text) blocks.push({ type:'text', text:text });
  addMsg('user', userShow, userImg);
  const history = state.msgs.slice(-19).map(i => ({ role:i.role, content:i.content }));
  history.push({ role:'user', content: blocks.length === 1 ? blocks[0].text : blocks });
  addThinking();
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), CONST.DIALOG_TIMEOUT);
  try {
    const res = await fetchWithRetry({
      url: `${config.baseUrl}/chat/completions`,
      method: 'POST',
      mode: 'cors',
      signal: controller.signal,
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${config.apiKey}` },
      body: JSON.stringify({ model:config.modelName, messages:[{role:'system',content:config.systemPrompt},...history], max_tokens:1000 })
    });
    clearTimeout(timer);
    const data = await res.json();
    rmThinking();
    if (data.choices?.[0]?.message?.content) {
      addMsg('assistant', data.choices[0].message.content);
      speakText(data.choices[0].message.content);
    } else {
      addMsg('assistant', `接口返回异常：${escapeHtml(JSON.stringify(data))}`, null, false);
    }
  } catch (err) {
    clearTimeout(timer);
    const tip = err.name === 'AbortError' ? '对话超时' : escapeHtml(err.message);
    addMsg('assistant', `对话请求失败：${tip}`, null, false);
  }
}

// ======================== 代理测试 OPTIONS优先+空POST无计费 ========================
async function testProxy() {
  const url = $.proxyUrl.value.trim();
  if (!url) {
    alert('请填写代理地址');
    return;
  }
  try {
    await fetch(url, { method:'OPTIONS', mode:'cors', signal:AbortSignal.timeout(5000) });
    alert('✅ OPTIONS预检通过，不消耗API额度');
    return;
  } catch (optErr) {
    try {
      const res = await fetch(url, {
        method:'POST',
        mode:'cors',
        signal:AbortSignal.timeout(5000),
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ ping:"test" })
      });
      if (res.status < 500) alert(`✅ POST兼容检测正常`);
      else alert(`⚠️ 后端异常码${res.status}`);
    } catch (postErr) {
      alert(`❌ 连接失败：${escapeHtml(postErr.message)}`);
    }
  }
}

// ======================== 设置面板 ========================
function openSettings() {
  document.getElementById('apiKey').value = config.apiKey;
  document.getElementById('baseUrl').value = config.baseUrl;
  document.getElementById('modelName').value = config.modelName;
  document.getElementById('systemPrompt').value = config.systemPrompt;
  $.voiceMode.value = config.voiceMode;
  $.proxyUrl.value = config.proxyUrl;
  if (state.audioB64 && state.isAudioPersisted) {
    $.audioBtn.textContent = '✅ 音色已保存';
    $.audioStatus.textContent = '刷新不丢失';
  } else if (state.audioB64) {
    $.audioBtn.textContent = '📌 临时音色';
    $.audioStatus.textContent = '刷新丢失';
  } else {
    $.audioStatus.textContent = '未上传';
  }
  toggleMimoFields(config.voiceMode === 'mimo');
  $.overlay.classList.add('show');
}
function closeSettings() { $.overlay.classList.remove('show'); }
function closeSettingsOutside(e) { if (e.target === $.overlay) closeSettings(); }
function toggleMimoFields(show) {
  document.getElementById('proxyWrap').style.display = show ? 'block' : 'none';
  document.getElementById('audioWrap').style.display = show ? 'block' : 'none';
}
function saveSettings() {
  config.apiKey = document.getElementById('apiKey').value.trim();
  config.baseUrl = document.getElementById('baseUrl').value.trim();
  config.modelName = document.getElementById('modelName').value.trim();
  config.systemPrompt = document.getElementById('systemPrompt').value.trim();
  config.voiceMode = $.voiceMode.value;
  config.proxyUrl = $.proxyUrl.value.trim();
  localStorage.setItem('apiKey', config.apiKey);
  localStorage.setItem('baseUrl', config.baseUrl);
  localStorage.setItem('modelName', config.modelName);
  localStorage.setItem('systemPrompt', config.systemPrompt);
  localStorage.setItem('voiceMode', config.voiceMode);
  localStorage.setItem('proxyUrl', config.proxyUrl);
  closeSettings();
  addMsg('assistant', `✅ 设置保存，语音：${config.voiceMode === 'browser' ? '系统语音' : '克隆语音'}`, null, false);
  if (state.voiceOn) $.voiceStatus.textContent = config.voiceMode === 'browser' ? '系统语音' : '克隆语音';
}

// 清空全部缓存（判断输入框）
function clearAllStorage() {
  const inputText = $.input.value.trim();
  let tip = '全部缓存（密钥/聊天/音色）删除，不可恢复';
  if (inputText) tip += '\n⚠️ 当前输入未发送文字会丢失！';
  if (!confirm(tip)) return;
  localStorage.clear();
  state = { msgs:[], pendingFile:null, voiceOn:false, curAudio:null, audioB64:'', audioMime:'', audioUnlocked:false, isSpeaking:false, audioUrl:null, idleTimer:null, isAudioPersisted:false };
  disposeAudio();
  $.chat.innerHTML = '<div class="welcome">✨ 和 Zephyr 说说话吧～</div>';
  alert('缓存清空，点击确定刷新页面');
  location.reload();
}

  if (localStorage.getItem('audioB64')) {
    state.audioB64 = localStorage.getItem('audioB64');
    state.audioMime = localStorage.getItem('audioMime');
    state.isAudioPersisted = true;
  }
  loadHistory();
  $.voiceToggle.textContent = state.voiceOn ? '🔊' : '🔇';
  $.voiceToggle.classList.toggle('on', state.voiceOn);

  $.voiceMode.addEventListener('change', () => toggleMimoFields($.voiceMode.value === 'mimo'));
  toggleMimoFields(config.voiceMode === 'mimo');
  window.addEventListener('beforeunload', () => {
    disposeAudio();
    clearTimeout(state.idleTimer);
  });
});
